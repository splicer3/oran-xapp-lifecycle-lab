name: repository checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core plotly

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/ric-lifecycle/collections/requirements.yml
          ansible-galaxy collection install -r ansible/istio-rate-limit-demo/collections/requirements.yaml

      - name: Compile Python scripts
        run: |
          python -m py_compile ansible/istio-ab-testing/scripts/plot_ab.py
          python -m py_compile ansible/istio-rate-limit-demo/scripts/plot_rate_limit.py

      - name: Check Ansible syntax
        run: |
          cd ansible/ric-lifecycle
          ANSIBLE_LOCAL_TEMP=/tmp ANSIBLE_REMOTE_TEMP=/tmp ansible-playbook --syntax-check site.yml -i inventory/hosts.ini.example
          ANSIBLE_LOCAL_TEMP=/tmp ANSIBLE_REMOTE_TEMP=/tmp ansible-playbook --syntax-check reset.yml -i inventory/hosts.ini.example
          ANSIBLE_LOCAL_TEMP=/tmp ANSIBLE_REMOTE_TEMP=/tmp ansible-playbook --syntax-check playbooks/validate.yml -i inventory/hosts.ini.example

      - name: Check for unsafe public artifacts
        run: |
          found="$(find . -path ./.git -prune -o \( \
            -name '*.pcap' -o \
            -name '*.pcapng' -o \
            -name '*.kubeconfig' -o \
            -name 'kubeconfig' -o \
            -name 'vault.yaml' -o \
            -name '*.vault-pass' -o \
            -name '.DS_Store' -o \
            -name '*.log' \
          \) -print)"
          if [ -n "$found" ]; then
            echo "$found"
            exit 1
          fi
