---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ufw
      - curl
      - jq
      - iptables
    state: present

- name: Ensure br_netfilter is loaded at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: "br_netfilter\n"
    owner: root
    group: root
    mode: '0644'

- name: Load br_netfilter now
  community.general.modprobe:
    name: br_netfilter
    state: present

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true


- name: Set rp_filter to loose mode (2) for Kubernetes routing
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: "2"
    state: present
    reload: true

- name: Set default rp_filter to loose mode (2)
  ansible.posix.sysctl:
    name: net.ipv4.conf.default.rp_filter
    value: "2"
    state: present
    reload: true

- name: Ensure bridge-nf iptables (IPv4)
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-iptables
    value: "1"
    state: present
    reload: true

- name: Ensure bridge-nf iptables (IPv6)
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-ip6tables
    value: "1"
    state: present
    reload: true

# ----------------- UFW baseline -----------------
- name: Ensure UFW default forward policy is ACCEPT
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
    create: false

- name: Set UFW default deny incoming
  community.general.ufw:
    state: enabled
    direction: incoming
    policy: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH from control station/network
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    from_ip: "{{ control_cidr }}"
    comment: "SSH from control station"

# K3s node-to-node essentials (all nodes)
- name: Allow kubelet 10250 from cluster nodes
  community.general.ufw:
    rule: allow
    port: "10250"
    proto: tcp
    from_ip: "{{ cluster_node_cidr }}"
    comment: "kubelet from nodes"

- name: Allow flannel VXLAN 8472/udp from cluster nodes
  community.general.ufw:
    rule: allow
    port: "8472"
    proto: udp
    from_ip: "{{ cluster_node_cidr }}"
    comment: "flannel vxlan"

# K3s supervisor (masters only)
- name: Allow k3s supervisor 9345 from cluster nodes (masters)
  community.general.ufw:
    rule: allow
    port: "9345"
    proto: tcp
    from_ip: "{{ cluster_node_cidr }}"
    comment: "k3s supervisor"
  when: "'k3s_master' in group_names"

# Permit traffic on CNI and flannel interfaces
- name: Allow inbound on cni0
  community.general.ufw:
    rule: allow
    interface: cni0
    direction: in
    comment: "allow pod traffic (cni0)"

- name: Allow outbound on cni0
  community.general.ufw:
    rule: allow
    interface: cni0
    direction: out
    comment: "allow pod traffic (cni0)"

- name: Allow inbound on flannel.1
  community.general.ufw:
    rule: allow
    interface: flannel.1
    direction: in
    comment: "allow vxlan (flannel.1)"

- name: Allow outbound on flannel.1
  community.general.ufw:
    rule: allow
    interface: flannel.1
    direction: out
    comment: "allow vxlan (flannel.1)"

# Permit routed traffic between pods and services across nodes (UFW route rules)
- name: UFW route allow PodCIDR -> ServiceCIDR (all protocols)
  community.general.ufw:
    rule: allow
    route: true
    from_ip: "{{ pod_cidr }}"
    to_ip: "{{ service_cidr }}"
    comment: "k8s routed: pods -> services"

- name: UFW route allow ServiceCIDR -> PodCIDR (all protocols)
  community.general.ufw:
    rule: allow
    route: true
    from_ip: "{{ service_cidr }}"
    to_ip: "{{ pod_cidr }}"
    comment: "k8s routed: services -> pods"

- name: UFW route allow PodCIDR <-> PodCIDR (all protocols)
  community.general.ufw:
    rule: allow
    route: true
    from_ip: "{{ pod_cidr }}"
    to_ip: "{{ pod_cidr }}"
    comment: "k8s routed: pod to pod"

- name: UFW route allow DNS from pods to services (UDP 53)
  community.general.ufw:
    rule: allow
    route: true
    from_ip: "{{ pod_cidr }}"
    to_ip: "{{ service_cidr }}"
    port: "53"
    proto: udp
    comment: "k8s routed: DNS UDP"

- name: UFW route allow DNS from pods to services (TCP 53)
  community.general.ufw:
    rule: allow
    route: true
    from_ip: "{{ pod_cidr }}"
    to_ip: "{{ service_cidr }}"
    port: "53"
    proto: tcp
    comment: "k8s routed: DNS TCP"

# ----------------- Open HTTP/HTTPS for Ingress -----------------
- name: Open HTTP/HTTPS for Ingress
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    comment: "HTTP/HTTPS for Ingress"
  loop: [80, 443]
  when: open_http_https | bool

# UFW is already enabled via first rule; ensure it's on
- name: Ensure UFW enabled
  community.general.ufw:
    state: enabled

- name: Reload UFW to apply interface/forwarding changes
  community.general.ufw:
    state: reloaded
