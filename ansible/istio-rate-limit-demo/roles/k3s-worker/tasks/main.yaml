---
- name: Compute K3s server URL
  ansible.builtin.set_fact:
    k3s_server_url: >-
      https://{{ hostvars[groups['k3s_master'][0]].ansible_host |
      default(hostvars[groups['k3s_master'][0]].ansible_default_ipv4.address) }}:6443

- name: Compute host-only prefix (e.g., "192.168.56.")
  ansible.builtin.set_fact:
    hostonly_prefix: "{{ vbox_hostonly_cidr.split('/')[0].rsplit('.', 1)[0] ~ '.' }}"

# Detect the VirtualBox host-only interface & IP (same logic as server)
- name: Detect host-only interface
  ansible.builtin.shell: |
    set -euo pipefail
    ip -o -4 address show \
      | awk '$4 ~ /^{{ hostonly_prefix }}[0-9]+/ {print $2; exit}'
  args:
    executable: /bin/bash
  register: _hostonly_iface
  changed_when: false

- name: Debug picked interface
  ansible.builtin.debug:
    var: _hostonly_iface.stdout

- name: Fail when host-only interface is missing
  ansible.builtin.fail:
    msg: "Unable to detect interface on {{ vbox_hostonly_cidr }}. Set k3s_flannel_iface manually or fix host-only networking."
  when: _hostonly_iface.stdout is not defined or (_hostonly_iface.stdout | trim) == ''

- name: Detect host-only IPv4 address
  ansible.builtin.shell: |
    set -euo pipefail
    IF="{{ _hostonly_iface.stdout | trim }}"
    [ -n "$IF" ] && ip -o -4 addr show dev "$IF" | awk '{print $4}' | cut -d/ -f1 || true
  args:
    executable: /bin/bash
  register: _hostonly_ip
  changed_when: false
  when: _hostonly_iface.stdout is defined and (_hostonly_iface.stdout | trim) != ''

- name: Set facts for Flannel interface and node IP
  ansible.builtin.set_fact:
    k3s_flannel_iface: "{{ _hostonly_iface.stdout | trim }}"
    k3s_node_ip: "{{ (_hostonly_ip.stdout | trim) | default(ansible_default_ipv4.address, true) }}"
  when: _hostonly_iface.stdout is defined and (_hostonly_iface.stdout | trim) != ''

- name: Ensure config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Render K3s agent config (bind to host-only NIC)
  ansible.builtin.template:
    src: k3s_agent_config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: '0644'
  notify: Restart k3s agent

- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/get-k3s.sh
    mode: '0755'

- name: Check if K3s agent is installed
  ansible.builtin.systemd:
    name: k3s-agent
  register: k3s_agent_active
  changed_when: false
  failed_when: false

- name: Install K3s agent
  ansible.builtin.shell: |
    INSTALL_K3S_CHANNEL="{{ k3s_channel }}" \
    INSTALL_K3S_EXEC="agent" \
    /usr/local/bin/get-k3s.sh
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  when: k3s_agent_active.status is not defined or k3s_agent_active.status != 'active'
